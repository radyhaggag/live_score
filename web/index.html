<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
  >
  <meta
    name="description"
    content="Live Score is a fast football live score app for fixtures, standings, lineups, match events, and live updates."
  >
  <meta name="theme-color" content="#0B1F3A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Live Score">
  <meta name="format-detection" content="telephone=no">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Live Score">
  <meta
    property="og:description"
    content="Fast football live scores, fixtures, standings, lineups, and match events in one polished Flutter app."
  >
  <meta property="og:image" content="og-image.png">
  <meta property="og:image:alt" content="Live Score app logo">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Live Score">
  <meta
    name="twitter:description"
    content="Fast football live scores, fixtures, standings, lineups, and match events in one polished Flutter app."
  >
  <meta name="twitter:image" content="og-image.png">

  <!-- iOS meta tags & icons -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Live Score</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
